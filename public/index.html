<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskFlow — IT Helpdesk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            surface:  '#0d1117',
            panel:    '#161b22',
            card:     '#1c2128',
            border:   '#30363d',
            muted:    '#8b949e',
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; }
    html { background: #0d1117; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* Markdown */
    .md-body { line-height: 1.7; }
    .md-body h2 { font-size: 1.05rem; font-weight: 700; margin: 1rem 0 0.5rem; color: #e6edf3; border-bottom: 1px solid #30363d; padding-bottom: 0.35rem; }
    .md-body h3 { font-size: 0.95rem; font-weight: 600; margin: 0.75rem 0 0.35rem; color: #cdd9e5; }
    .md-body p  { margin: 0.4rem 0; color: #adbac7; }
    .md-body ul, .md-body ol { margin: 0.4rem 0 0.4rem 1.5rem; }
    .md-body li { margin: 0.3rem 0; color: #adbac7; }
    .md-body strong { color: #e6edf3; font-weight: 600; }
    .md-body blockquote {
      border-left: 3px solid #f0883e; padding: 0.5rem 0.85rem;
      margin: 0.6rem 0; color: #f0883e; background: rgba(240,136,62,0.07);
      border-radius: 0 6px 6px 0; font-size: 0.85rem;
    }
    .md-body code {
      background: #161b22; padding: 2px 6px; border-radius: 5px;
      font-size: 0.82em; color: #79c0ff; border: 1px solid #30363d;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .md-body pre { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 0.85rem; margin: 0.5rem 0; overflow-x: auto; }
    .md-body pre code { background: none; border: none; padding: 0; }
    .md-body table { width: 100%; border-collapse: collapse; margin: 0.6rem 0; font-size: 0.82rem; }
    .md-body th { background: #1c2128; padding: 7px 12px; text-align: left; border: 1px solid #30363d; color: #cdd9e5; font-weight: 600; }
    .md-body td { padding: 6px 12px; border: 1px solid #30363d; color: #adbac7; }
    .md-body hr { border-color: #30363d; margin: 0.75rem 0; }
    .md-body ol { list-style: decimal; }
    .md-body ul { list-style: disc; }

    /* Streaming cursor */
    .streaming-cursor::after { content: '▌'; animation: blink-cur 0.75s infinite; color: #388bfd; }
    @keyframes blink-cur { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Typing dots */
    .typing-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #484f58; animation: bounce-dot 1.3s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce-dot { 0%,80%,100%{transform:translateY(0);opacity:.4} 40%{transform:translateY(-5px);opacity:1} }

    /* Form fields */
    .form-bubble form { all: unset; display: block; }
    .form-bubble input[type=text],
    .form-bubble input[type=date],
    .form-bubble input[type=number],
    .form-bubble input[type=email],
    .form-bubble textarea,
    .form-bubble select {
      display: block; width: 100%;
      padding: 0.5rem 0.75rem;
      background: #0d1117; color: #cdd9e5;
      border: 1px solid #30363d; border-radius: 8px;
      font-size: 0.85rem; margin-top: 4px; box-sizing: border-box;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .form-bubble select[multiple] { height: 8rem; }
    .form-bubble input:focus,
    .form-bubble select:focus,
    .form-bubble textarea:focus {
      outline: none; border-color: #388bfd;
      box-shadow: 0 0 0 3px rgba(56,139,253,0.15);
    }
    .form-bubble label {
      font-size: 0.78rem; font-weight: 500;
      color: #8b949e; display: block; margin-top: 0.9rem; letter-spacing: 0.01em;
    }
    .form-bubble .flex.items-center { display: flex; align-items: center; gap: 8px; margin-top: 0.8rem; }
    .form-bubble .flex.items-center label { margin-top: 0; color: #cdd9e5; font-size: 0.85rem; }
    .form-bubble input[type=checkbox] { width: 16px; height: 16px; accent-color: #388bfd; flex-shrink: 0; cursor: pointer; }
    .form-bubble button[type=submit] {
      margin-top: 1.25rem; width: 100%; padding: 0.65rem;
      background: #1f6feb; color: white; border-radius: 8px;
      font-weight: 600; font-size: 0.875rem; cursor: pointer;
      border: none; transition: background 0.15s, transform 0.1s;
      font-family: 'Inter', system-ui, sans-serif; letter-spacing: 0.01em;
    }
    .form-bubble button[type=submit]:hover { background: #388bfd; }
    .form-bubble button[type=submit]:active { transform: scale(0.99); }
    .form-bubble button[type=submit]:disabled { background: #21262d; color: #484f58; cursor: not-allowed; transform: none; }
    .form-bubble .text-red-500 { color: #f85149; font-size: 0.78rem; margin-top: 3px; display: block; }

    /* Step wizard */
    .formora-step { display: none; }
    .formora-step.active { display: block; }
    .step-nav { display: flex; gap: 8px; margin-top: 1.1rem; }
    .step-nav button {
      flex: 1; padding: 0.55rem; border-radius: 8px; font-weight: 600;
      font-size: 0.82rem; cursor: pointer; border: none;
      font-family: 'Inter', system-ui, sans-serif; transition: background 0.15s;
    }
    .btn-back { background: #21262d; color: #8b949e; border: 1px solid #30363d !important; }
    .btn-back:hover { background: #30363d; }
    .btn-next { background: #1f6feb; color: white; }
    .btn-next:hover { background: #388bfd; }
    .step-progress {
      display: flex; gap: 5px; justify-content: center; margin-top: 0.9rem;
    }
    .step-pip {
      height: 4px; flex: 1; border-radius: 2px; background: #30363d;
      transition: background 0.2s;
    }
    .step-pip.active { background: #388bfd; }

    /* Model progress bar */
    #model-progress-bar { transition: width 0.4s ease; }

    /* Model switcher pills */
    .model-pill {
      background: #1c2128; border: 1px solid #30363d; border-radius: 20px;
      padding: 3px 11px; font-size: 0.7rem; color: #8b949e; font-family: inherit;
      cursor: pointer; transition: background .15s, border-color .15s, color .15s; white-space: nowrap;
    }
    .model-pill:hover:not(:disabled) { border-color: #58a6ff; color: #58a6ff; }
    .model-pill.active {
      background: rgba(56,139,253,0.12); border-color: #388bfd; color: #58a6ff; font-weight: 500;
    }
    .model-pill:disabled { opacity: 0.45; cursor: not-allowed; }

    /* Suggestion chips */
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1c2128; border: 1px solid #30363d;
      color: #8b949e; font-size: 0.8rem; padding: 0.45rem 0.85rem;
      border-radius: 20px; cursor: pointer; transition: all 0.15s;
      white-space: nowrap;
    }
    .chip:hover { background: #21262d; border-color: #388bfd; color: #cdd9e5; }

    /* Input send button icon */
    #send-btn svg { display: inline; }
  </style>
</head>

<!-- ═══════════════════════════════════════════ WebGPU MODULE ═══ -->
<script type="module">
import { pipeline, TextStreamer, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@4.0.0';

env.allowLocalModels = false;
if (env.backends?.onnx?.wasm) {
  env.backends.onnx.wasm.numThreads = 1;
  env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
}

window._llm = { status: 'idle', generator: null, modelId: null };

const statusEl     = document.getElementById('model-status');
const progressWrap = document.getElementById('model-progress-wrap');
const progressBar  = document.getElementById('model-progress-bar');
const statusWrap   = document.getElementById('model-status-wrap');

function setStatusUI(text, color, progress) {
  statusEl.textContent = text;
  statusEl.style.color = color;
  if (progress != null) {
    progressWrap.classList.remove('hidden');
    progressBar.style.width = Math.round(progress) + '%';
  } else {
    progressWrap.classList.add('hidden');
  }
}

function bindGenerate() {
  window._llmGenerate = async function(systemPrompt, userPrompt, templateResponse, onToken, onDone, onFallback) {
    if (!window._llm.generator || window._llm.status !== 'ready') {
      onFallback(templateResponse); return;
    }
    const messages = [
      { role: 'system', content: systemPrompt },
      { role: 'user',   content: userPrompt   },
    ];
    let accumulated = '';
    const streamer = new TextStreamer(window._llm.generator.tokenizer, {
      skip_prompt: true,
      skip_special_tokens: true,
      callback_function: (chunk) => { accumulated += chunk; onToken(accumulated); },
    });
    try {
      await window._llm.generator(messages, {
        max_new_tokens: 512,
        streamer,
        do_sample: false,
      });
      onDone(accumulated || templateResponse);
    } catch (err) {
      console.error('[DeskFlow] Inference error:', err);
      onFallback(templateResponse);
    }
  };
}

async function loadModel(modelId, label, onComplete) {
  window._llmGenerate = null;
  window._llm.status  = 'loading';

  if (window._llm.generator) {
    try { await window._llm.generator.dispose(); } catch {}
    window._llm.generator = null;
  }

  statusWrap.classList.remove('hidden');
  setStatusUI(`⏳ Loading ${label}…`, '#d29922', 0);
  progressWrap.classList.remove('hidden');

  try {
    window._llm.generator = await pipeline('text-generation', modelId, {
      dtype: 'q4',
      device: 'webgpu',
      progress_callback: (p) => {
        if (p.status !== 'progress') return;
        const pct = p.progress ?? 0;
        setStatusUI(`⏳ ${label} ${Math.round(pct)}%`, '#d29922', pct);
      },
    });
    window._llm.status  = 'ready';
    window._llm.modelId = modelId;
    bindGenerate();
    setStatusUI(`✅ ${label} ready`, '#3fb950', null);
    setTimeout(() => statusWrap.classList.add('hidden'), 3000);
  } catch (err) {
    console.error('[DeskFlow] Model load failed:', err);
    window._llm.status = 'error';
    setStatusUI(`⚠️ ${label} unavailable — using templates`, '#d29922', null);
    setTimeout(() => statusWrap.classList.add('hidden'), 5000);
  }

  onComplete?.();
}

window._llmSwitchModel = loadModel;

if (!navigator.gpu) {
  window._llm.status = 'unavailable';
  setStatusUI('⚠️ Templates only (no WebGPU)', '#d29922', null);
  setTimeout(() => statusWrap.classList.add('hidden'), 4000);
} else {
  loadModel('HuggingFaceTB/SmolLM2-360M-Instruct', 'SmolLM2-360M', null);
}
</script>

<!-- ═══════════════════════════════════════════ MAIN UI ═══ -->
<script>
const messagesEl = document.getElementById('messages');
const msgInput   = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const inputWrap  = document.getElementById('input-wrap');
const emptyState = document.getElementById('empty-state');

// Input focus ring
msgInput.addEventListener('focus',  () => inputWrap.style.boxShadow = '0 0 0 3px rgba(56,139,253,0.25)');
msgInput.addEventListener('blur',   () => inputWrap.style.boxShadow = '0 0 0 0 transparent');
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });
sendBtn.addEventListener('click', sendMessage);

function useChip(text) {
  msgInput.value = text;
  msgInput.focus();
  sendMessage();
}

function hideEmptyState() {
  if (emptyState) emptyState.style.display = 'none';
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// Bot row = avatar + bubble
function addBotRow(innerHTML, extraBubbleClass = '') {
  const row = document.createElement('div');
  row.className = 'flex items-start gap-3 max-w-3xl';

  const avatar = document.createElement('div');
  avatar.className = 'w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center mt-0.5';
  avatar.style.cssText = 'background:linear-gradient(135deg,#1f6feb,#388bfd)';
  avatar.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 17H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v3"/><path d="M13 21l2-2 4 4 2-2-4-4 2-2-6-1z"/></svg>`;

  const bubble = document.createElement('div');
  bubble.className = 'rounded-2xl rounded-tl-sm px-4 py-3 text-sm leading-relaxed flex-1 ' + extraBubbleClass;
  bubble.style.cssText = 'background:#1c2128;border:1px solid #30363d;color:#adbac7;max-width:44rem';
  bubble.innerHTML = innerHTML;

  row.appendChild(avatar);
  row.appendChild(bubble);

  const wrap = document.createElement('div');
  wrap.className = 'flex justify-start';
  wrap.appendChild(row);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function addUserBubble(text) {
  hideEmptyState();
  const wrap = document.createElement('div');
  wrap.className = 'flex justify-end';
  const bubble = document.createElement('div');
  bubble.className = 'rounded-2xl rounded-tr-sm px-4 py-3 text-sm leading-relaxed';
  bubble.style.cssText = 'background:linear-gradient(135deg,#1f6feb,#388bfd);color:white;max-width:32rem';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function addTextBubble(text) {
  return addBotRow(`<span style="color:#adbac7">${escapeHtml(text)}</span>`);
}

function addTyping() {
  return addBotRow('<div class="flex items-center gap-1.5 py-1"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>');
}

function addMarkdownBubble(md) {
  addBotRow(`<div class="md-body">${marked.parse(md)}</div>`);
}

function createStreamingBubble() {
  const bubble = addBotRow('<div class="md-body streaming-cursor"></div>');
  const inner  = bubble.querySelector('.md-body');
  return {
    update(md) { inner.className = 'md-body streaming-cursor'; inner.innerHTML = marked.parse(md); scrollBottom(); },
    done(md)   { inner.className = 'md-body'; inner.innerHTML = marked.parse(md || ''); scrollBottom(); },
    remove()   { bubble.closest('.flex.justify-start').remove(); },
  };
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setLoading(on) {
  sendBtn.disabled  = on;
  msgInput.disabled = on;
  sendBtn.style.opacity = on ? '0.4' : '1';
}

// ── Send message ──────────────────────────────────────────────────── //
async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  hideEmptyState();
  addUserBubble(text);
  msgInput.value = '';
  setLoading(true);

  const typingBubble = addTyping();
  let apiData;

  try {
    const res = await fetch('/api/message', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    apiData = await res.json();
  } catch (_err) {
    typingBubble.closest('.flex.justify-start').remove();
    addTextBubble('Sorry, something went wrong. Please try again.');
    setLoading(false);
    return;
  }

  typingBubble.closest('.flex.justify-start').remove();

  // 1. Show template response immediately — never block on LLM
  const chatBubble = addTextBubble(apiData.template_response);

  // 2. Show form immediately (don't wait for LLM)
  const injectedBubble = apiData.form_html ? injectForm(apiData.form_html, apiData.intent) : null;
  setLoading(false);

  // Focus: first visible field in form, or back to chat input
  if (injectedBubble) {
    const firstField = injectedBubble.querySelector(
      'input:not([type="hidden"]):not([disabled]), select:not([disabled]), textarea:not([disabled])'
    );
    firstField?.focus();
  } else {
    msgInput.focus();
  }

  // 3. Enhance chat bubble with LLM in the background (non-blocking)
  const llmGenerate = window._llmGenerate;
  if (typeof llmGenerate !== 'function' || window._llm?.status !== 'ready') return;

  chatBubble.innerHTML = '<div class="md-body streaming-cursor"></div>';
  const innerEl = chatBubble.querySelector('.md-body');

  llmGenerate(
    apiData.system_prompt,
    apiData.user_prompt,
    apiData.template_response,
    (acc) => {
      innerEl.className = 'md-body streaming-cursor';
      innerEl.innerHTML = marked.parse(acc);
      scrollBottom();
    },
    (final) => {
      innerEl.className = 'md-body';
      innerEl.innerHTML = marked.parse(final || apiData.template_response);
      scrollBottom();
    },
    (_t) => {
      chatBubble.textContent = apiData.template_response;
    },
  );
}

// ── Form injection ────────────────────────────────────────────────── //
function injectForm(formHtml, intent) {
  const outer = document.createElement('div');
  outer.className = 'flex items-start gap-3 max-w-3xl';

  const avatar = document.createElement('div');
  avatar.className = 'w-7 h-7 rounded-lg flex-shrink-0 flex items-center justify-center mt-0.5 invisible';
  outer.appendChild(avatar);

  const bubble = document.createElement('div');
  bubble.className = 'form-bubble rounded-2xl rounded-tl-sm px-5 py-4 text-sm flex-1';
  bubble.style.cssText = 'background:#1c2128;border:1px solid #30363d;max-width:44rem';
  bubble.innerHTML = formHtml;
  outer.appendChild(bubble);

  const wrap = document.createElement('div');
  wrap.className = 'flex justify-start';
  wrap.appendChild(outer);
  messagesEl.appendChild(wrap);
  scrollBottom();

  // Get the form ID from the data-formora-id wrapper (formora-core pattern)
  const formId = bubble.querySelector('[data-formora-id]')?.getAttribute('data-formora-id') || '';

  // Listen on window for formora:submit CustomEvent — matches formora-core renderer output
  async function onFormoraSubmit(e) {
    const { raw } = e.detail;
    // Parse the __formora__{...} message to get form_id and data
    let payload;
    try { payload = JSON.parse(raw.slice('__formora__'.length)); } catch { return; }
    if (payload.form_id !== formId) return; // not this form

    // One submission per form
    window.removeEventListener('formora:submit', onFormoraSubmit);

    const formData = payload.data;
    const typingBubble = addTyping();
    let apiData;
    try {
      const res = await fetch('/api/submit', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ form_id: formId, data: formData }),
      });
      apiData = await res.json();
    } catch (_err) {
      typingBubble.closest('.flex.justify-start').remove();
      addTextBubble('Failed to process your request. Please try again.');
      return;
    }

    // Collapse form bubble to a compact ticket pill
    const reqNum = apiData.request_number || '';
    bubble.className = 'rounded-xl px-4 py-2 text-xs font-medium flex items-center gap-2';
    bubble.style.cssText = 'background:#1c2128;border:1px solid #3fb95022;color:#3fb950;max-width:44rem';
    bubble.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> Request <strong>${reqNum}</strong> submitted`;

    typingBubble.closest('.flex.justify-start').remove();

    async function resolveTicket(response, source) {
      try {
        await fetch('/api/resolve', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticket_id: apiData.ticket_id, request_number: apiData.request_number, form_id: formId, data: formData, response, source }),
        });
      } catch (err) { console.warn('[DeskFlow] /api/resolve failed:', err); }
    }

    const llmGenerate = window._llmGenerate;
    if (typeof llmGenerate !== 'function' || window._llm?.status !== 'ready') {
      addMarkdownBubble(apiData.template_response);
      resolveTicket(apiData.template_response, 'template');
      return;
    }

    const streaming = createStreamingBubble();
    llmGenerate(
      apiData.system_prompt,
      apiData.user_prompt,
      apiData.template_response,
      (acc)      => streaming.update(acc),
      (final)    => { streaming.done(final); resolveTicket(final, 'webgpu'); },
      (template) => { streaming.remove(); addMarkdownBubble(template); resolveTicket(template, 'template'); },
    );
    scrollBottom();
  }

  window.addEventListener('formora:submit', onFormoraSubmit);
  return bubble;
}

// ── Model switcher ──────────────────────────────────────────────────── //
document.querySelectorAll('.model-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    if (pill.classList.contains('active')) return;
    if (typeof window._llmSwitchModel !== 'function') return;

    document.querySelectorAll('.model-pill').forEach(p => {
      p.classList.remove('active');
      p.disabled = true;
    });
    pill.classList.add('active');

    window._llmSwitchModel(
      pill.dataset.modelId,
      pill.dataset.modelLabel,
      () => document.querySelectorAll('.model-pill').forEach(p => { p.disabled = false; }),
    );
  });
});

// collectFormData and setupStepWizard removed:
// formora-core now handles data collection and multi-step navigation
// via its own inline JavaScript, dispatching window formora:submit.
</script>

<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeskFlow — IT Helpdesk</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* Scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

    /* Markdown rendered inside bot bubbles */
    .md-body h2 { font-size: 1.1rem; font-weight: 700; margin: 0.75rem 0 0.4rem; color: #e5e7eb; }
    .md-body h3 { font-size: 1rem; font-weight: 600; margin: 0.6rem 0 0.3rem; color: #d1d5db; }
    .md-body p  { margin: 0.35rem 0; line-height: 1.6; }
    .md-body ul, .md-body ol { margin: 0.35rem 0 0.35rem 1.4rem; }
    .md-body li { margin: 0.2rem 0; }
    .md-body strong { color: #f9fafb; }
    .md-body blockquote { border-left: 3px solid #f59e0b; padding-left: 0.75rem; margin: 0.5rem 0; color: #fcd34d; background: rgba(245,158,11,0.08); border-radius: 0 4px 4px 0; }
    .md-body code { background: #1f2937; padding: 1px 5px; border-radius: 4px; font-size: 0.85em; color: #34d399; }
    .md-body table { width: 100%; border-collapse: collapse; margin: 0.5rem 0; font-size: 0.85rem; }
    .md-body th { background: #1f2937; padding: 6px 10px; text-align: left; border: 1px solid #374151; }
    .md-body td { padding: 5px 10px; border: 1px solid #374151; }
    .md-body hr { border-color: #374151; margin: 0.5rem 0; }

    /* Streaming cursor */
    .streaming-cursor::after { content: '▌'; animation: blink-cursor 0.8s infinite; color: #60a5fa; }
    @keyframes blink-cursor { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Typing indicator */
    .typing span { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #6b7280; animation: blink 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Form inside chat */
    .form-bubble form { all: unset; display: block; }
    .form-bubble input[type=text],
    .form-bubble input[type=date],
    .form-bubble input[type=number],
    .form-bubble input[type=email],
    .form-bubble textarea,
    .form-bubble select {
      display: block; width: 100%; padding: 0.45rem 0.65rem;
      background: #1f2937; color: #f3f4f6;
      border: 1px solid #374151; border-radius: 6px;
      font-size: 0.875rem; margin-top: 2px; box-sizing: border-box;
    }
    .form-bubble select[multiple] { height: 7rem; }
    .form-bubble input:focus, .form-bubble select:focus, .form-bubble textarea:focus {
      outline: 2px solid #3b82f6; border-color: #3b82f6;
    }
    .form-bubble label { font-size: 0.8rem; color: #9ca3af; display: block; margin-top: 0.7rem; }
    .form-bubble .flex.items-center { display: flex; align-items: center; gap: 6px; margin-top: 0.7rem; }
    .form-bubble .flex.items-center label { margin-top: 0; color: #d1d5db; }
    .form-bubble input[type=checkbox] { width: 15px; height: 15px; accent-color: #3b82f6; flex-shrink: 0; }
    .form-bubble button[type=submit] {
      margin-top: 1rem; width: 100%; padding: 0.55rem;
      background: #2563eb; color: white; border-radius: 8px;
      font-weight: 600; font-size: 0.9rem; cursor: pointer;
      border: none; transition: background 0.15s;
    }
    .form-bubble button[type=submit]:hover { background: #1d4ed8; }
    .form-bubble button[type=submit]:disabled { background: #374151; cursor: not-allowed; }
    .form-bubble .text-red-500 { color: #ef4444; }
    /* Step wizard */
    .formora-step { display: none; }
    .formora-step.active { display: block; }
    .step-nav { display: flex; justify-content: space-between; margin-top: 1rem; gap: 8px; }
    .step-nav button { flex: 1; padding: 0.5rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; cursor: pointer; border: none; }
    .btn-back { background: #374151; color: #d1d5db; }
    .btn-next { background: #2563eb; color: white; }
    .step-indicator { font-size: 0.75rem; color: #6b7280; text-align: center; margin-top: 0.5rem; }

    /* Model progress bar */
    #model-progress-bar { transition: width 0.3s ease; }
  </style>
</head>

<body class="bg-gray-950 text-gray-100 h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center gap-3 flex-shrink-0">
    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-sm">D</div>
    <div>
      <div class="font-semibold text-white text-sm">DeskFlow</div>
      <div class="text-xs text-gray-400">AI-powered IT Helpdesk</div>
    </div>
    <!-- Model status badge -->
    <div id="model-status-wrap" class="ml-auto flex flex-col items-end gap-1">
      <div id="model-status" class="text-xs text-yellow-400">⏳ Loading AI model…</div>
      <div id="model-progress-wrap" class="w-48 h-1 bg-gray-700 rounded-full hidden">
        <div id="model-progress-bar" class="h-1 bg-blue-500 rounded-full" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-4"></div>

  <!-- Input -->
  <div class="bg-gray-900 border-t border-gray-800 px-4 py-3 flex gap-2 flex-shrink-0">
    <input
      id="msg-input"
      type="text"
      placeholder="Describe your IT issue…"
      class="flex-1 bg-gray-800 text-gray-100 rounded-xl px-4 py-2.5 text-sm outline-none border border-gray-700 focus:border-blue-500 transition-colors"
      autocomplete="off"
    />
    <button
      id="send-btn"
      class="bg-blue-600 hover:bg-blue-700 text-white rounded-xl px-4 py-2.5 text-sm font-semibold transition-colors disabled:opacity-50"
    >Send</button>
  </div>

<!-- ---------------------------------------------------------------- -->
<!-- WebGPU LLM — loaded as an ES module                              -->
<!-- ---------------------------------------------------------------- -->
<script type="module">
import { pipeline, TextStreamer, env } from 'https://cdn.jsdelivr.net/npm/@huggingface/transformers@3.5.0/dist/transformers.min.js';

// Mirror barq-web-rag env setup — required to prevent onnxruntime-web
// memory errors and to locate WASM binaries from CDN.
env.allowLocalModels = false;
if (env.backends?.onnx?.wasm) {
  env.backends.onnx.wasm.numThreads = 1;
  env.backends.onnx.wasm.wasmPaths = 'https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/';
}

const MODEL_ID  = 'LiquidAI/LFM2.5-350M-ONNX';
const DTYPE     = 'q4';

// Shared state exposed to the non-module script via window
window._llm = {
  status:    'idle',   // idle | loading | ready | error | unavailable
  generator: null,
  error:     null,
};

const statusEl      = document.getElementById('model-status');
const progressWrap  = document.getElementById('model-progress-wrap');
const progressBar   = document.getElementById('model-progress-bar');

function setStatusUI(text, cls, progress) {
  statusEl.textContent  = text;
  statusEl.className    = `text-xs ${cls}`;
  if (progress != null) {
    progressWrap.classList.remove('hidden');
    progressBar.style.width = `${Math.round(progress)}%`;
  } else {
    progressWrap.classList.add('hidden');
  }
}

// Check WebGPU availability
if (!navigator.gpu) {
  window._llm.status = 'unavailable';
  setStatusUI('⚠️ WebGPU unavailable — using templates', 'text-orange-400', null);
} else {
  setStatusUI('⏳ Loading AI model…', 'text-yellow-400', 0);
  progressWrap.classList.remove('hidden');

  (async () => {
    window._llm.status = 'loading';
    try {
      window._llm.generator = await pipeline('text-generation', MODEL_ID, {
        dtype: DTYPE,
        device: 'webgpu',
        progress_callback: (p) => {
          if (p.status !== 'progress') return;
          const pct = p.progress ?? 0;
          setStatusUI(`⏳ Loading AI model… ${Math.round(pct)}%`, 'text-yellow-400', pct);
        },
      });
      window._llm.status = 'ready';
      setStatusUI('✅ AI model ready', 'text-green-400', null);
      setTimeout(() => {
        document.getElementById('model-status-wrap').classList.add('hidden');
      }, 3000);
    } catch (err) {
      console.error('[DeskFlow] Model load failed:', err);
      window._llm.status = 'error';
      window._llm.error  = err.message;
      setStatusUI('⚠️ AI model failed — using templates', 'text-orange-400', null);
    }
  })();
}

/**
 * Generate a response using WebGPU.
 * Calls onToken(accumulatedText) progressively, then onDone(finalText).
 * Falls back to onFallback(templateResponse) if WebGPU is not ready.
 */
window._llmGenerate = async function (systemPrompt, userPrompt, templateResponse, onToken, onDone, onFallback) {
  if (!window._llm.generator || window._llm.status !== 'ready') {
    onFallback(templateResponse);
    return;
  }

  const messages = [
    { role: 'system', content: systemPrompt },
    { role: 'user',   content: userPrompt   },
  ];

  let accumulated = '';

  const streamer = new TextStreamer(window._llm.generator.tokenizer, {
    skip_prompt:          true,
    skip_special_tokens:  true,
    callback_function: (chunk) => {
      accumulated += chunk;
      onToken(accumulated);
    },
  });

  try {
    await window._llm.generator(messages, {
      max_new_tokens: 512,
      streamer,
      do_sample: false,
    });
    onDone(accumulated || templateResponse);
  } catch (err) {
    console.error('[DeskFlow] Inference error:', err);
    onFallback(templateResponse);
  }
};
</script>

<!-- ---------------------------------------------------------------- -->
<!-- Main UI logic                                                     -->
<!-- ---------------------------------------------------------------- -->
<script>
const messagesEl = document.getElementById('messages');
const msgInput   = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');

msgInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) sendMessage(); });
sendBtn.addEventListener('click', sendMessage);

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addBubble(html, side = 'bot', extraClass = '') {
  const wrap   = document.createElement('div');
  wrap.className = `flex ${side === 'user' ? 'justify-end' : 'justify-start'}`;
  const bubble = document.createElement('div');
  bubble.className = [
    'max-w-2xl rounded-2xl px-4 py-3 text-sm leading-relaxed',
    side === 'user'
      ? 'bg-blue-600 text-white rounded-br-sm'
      : 'bg-gray-800 text-gray-200 rounded-bl-sm',
    extraClass,
  ].join(' ');
  bubble.innerHTML = html;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

function addUserBubble(text)   { addBubble(escapeHtml(text), 'user'); }
function addTextBubble(text)   { addBubble(escapeHtml(text), 'bot'); }
function addTyping()           { return addBubble('<div class="typing"><span></span><span></span><span></span></div>', 'bot'); }

function addMarkdownBubble(md) {
  const html = marked.parse(md);
  addBubble(`<div class="md-body">${html}</div>`, 'bot');
}

/** Create an empty streaming bubble; returns an object to update or finalise it. */
function createStreamingBubble() {
  const bubble = addBubble('<div class="md-body streaming-cursor"></div>', 'bot');
  const inner  = bubble.querySelector('.md-body');
  return {
    update(md) {
      inner.className = 'md-body streaming-cursor';
      inner.innerHTML = marked.parse(md);
      scrollBottom();
    },
    done(md) {
      inner.className = 'md-body';
      inner.innerHTML = marked.parse(md || '');
      scrollBottom();
    },
    remove() {
      bubble.closest('div').remove();
    },
  };
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setLoading(on) {
  sendBtn.disabled  = on;
  msgInput.disabled = on;
}

// ------------------------------------------------------------------ //
// Send message                                                        //
// ------------------------------------------------------------------ //

async function sendMessage() {
  const text = msgInput.value.trim();
  if (!text) return;

  addUserBubble(text);
  msgInput.value = '';
  setLoading(true);

  const typing = addTyping();

  try {
    const res  = await fetch('/api/message', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ message: text }),
    });
    const data = await res.json();
    typing.closest('div').remove();

    addTextBubble(data.intro);
    injectForm(data.form_html, data.intent);
  } catch (_err) {
    typing.closest('div').remove();
    addTextBubble('Sorry, something went wrong. Please try again.');
  } finally {
    setLoading(false);
  }
}

// ------------------------------------------------------------------ //
// Form injection + submission                                         //
// ------------------------------------------------------------------ //

function injectForm(formHtml, intent) {
  const wrap   = document.createElement('div');
  wrap.className = 'flex justify-start';
  const bubble = document.createElement('div');
  bubble.className = 'form-bubble bg-gray-800 rounded-2xl rounded-bl-sm px-5 py-4 text-sm w-full max-w-2xl';
  bubble.innerHTML = formHtml;
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();

  const form = bubble.querySelector('form[data-formora]');
  if (!form) return;

  const steps = form.querySelectorAll('.formora-step');
  if (steps.length > 1) setupStepWizard(form, steps);

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = form.querySelector('button[type=submit]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Submitting…'; }

    const formData = collectFormData(form);
    const formId   = form.id;

    // Step 1: fetch RAG context + prompts from server
    const typing = addTyping();
    let apiData;
    try {
      const res = await fetch('/api/submit', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ form_id: formId, data: formData }),
      });
      apiData = await res.json();
    } catch (_err) {
      typing.closest('div').remove();
      addTextBubble('Failed to process your request. Please try again.');
      if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit'; }
      return;
    }

    // Collapse the form immediately after we have the server response
    bubble.innerHTML = `<div class="text-green-400 text-xs font-semibold">✅ Form submitted — ${formId.replace(/_/g,' ')}</div>`;

    // Step 2: browser-side WebGPU inference (or fallback to template)
    typing.closest('div').remove();

    /**
     * After inference completes (WebGPU or template), POST the final response
     * back to FastAPI so it can be logged / ticketed on the server.
     */
    async function resolveTicket(response, source) {
      try {
        await fetch('/api/resolve', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            ticket_id: apiData.ticket_id,
            form_id:   formId,
            data:      formData,
            response,
            source,
          }),
        });
      } catch (err) {
        console.warn('[DeskFlow] /api/resolve failed (non-fatal):', err);
      }
    }

    const llmGenerate = window._llmGenerate;
    if (typeof llmGenerate !== 'function') {
      // Module not yet parsed (extremely rare on slow connections)
      addMarkdownBubble(apiData.template_response);
      resolveTicket(apiData.template_response, 'template');
      return;
    }

    const streaming = createStreamingBubble();

    llmGenerate(
      apiData.system_prompt,
      apiData.user_prompt,
      apiData.template_response,
      // onToken — progressively update streaming bubble
      (accumulated) => streaming.update(accumulated),
      // onDone — finalise bubble, then POST result to FastAPI
      (final) => {
        streaming.done(final);
        resolveTicket(final, 'webgpu');
      },
      // onFallback — WebGPU unavailable/failed, use template, then POST to FastAPI
      (template) => {
        streaming.remove();
        addMarkdownBubble(template);
        resolveTicket(template, 'template');
      },
    );

    scrollBottom();
  });
}

function collectFormData(form) {
  const data = {};
  form.querySelectorAll('input, select, textarea').forEach(field => {
    if (!field.name) return;
    if (field.type === 'checkbox') {
      data[field.name] = field.checked;
    } else if (field.tagName === 'SELECT' && field.multiple) {
      data[field.name] = Array.from(field.selectedOptions).map(o => o.value);
    } else {
      if (field.value !== '') data[field.name] = field.value;
    }
  });
  return data;
}

function setupStepWizard(form, steps) {
  let current = 0;

  steps[0].classList.add('active');

  const submitBtn = form.querySelector('button[type=submit]');
  if (submitBtn) submitBtn.style.display = 'none';

  function renderNav() {
    form.querySelectorAll('.step-nav, .step-indicator').forEach(el => el.remove());

    const nav = document.createElement('div');
    nav.className = 'step-nav';

    if (current > 0) {
      const back = document.createElement('button');
      back.type = 'button'; back.className = 'btn-back'; back.textContent = '← Back';
      back.onclick = () => goStep(current - 1);
      nav.appendChild(back);
    }

    if (current < steps.length - 1) {
      const next = document.createElement('button');
      next.type = 'button'; next.className = 'btn-next'; next.textContent = 'Next →';
      next.onclick = () => goStep(current + 1);
      nav.appendChild(next);
    } else {
      if (submitBtn) { submitBtn.style.display = 'block'; submitBtn.style.marginTop = '1rem'; }
    }

    form.appendChild(nav);

    const indicator = document.createElement('div');
    indicator.className = 'step-indicator';
    indicator.textContent = `Step ${current + 1} of ${steps.length}`;
    form.appendChild(indicator);
  }

  function goStep(n) {
    steps[current].classList.remove('active');
    if (submitBtn && current === steps.length - 1) submitBtn.style.display = 'none';
    current = n;
    steps[current].classList.add('active');
    renderNav();
    scrollBottom();
  }

  renderNav();
}
</script>

</body>
</html>
